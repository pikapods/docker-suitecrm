name: Build and publish

on:
  workflow_dispatch:
    inputs:
      suitecrm_version:
        description: "SuiteCRM version (e.g. 7.15.1)"
        required: true
        type: string
      php_version:
        description: "PHP minor version"
        required: false
        default: "8.4"
        type: string
      base_digest:
        description: "Pin base image to this sha256:… (optional; resolved live if empty)"
        required: false
        type: string
      revision:
        description: "Manual rN override (optional; auto-computed if empty)"
        required: false
        type: string
      publish:
        description: "Publish to GHCR after tests pass"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

# Serialise builds of the same SuiteCRM version. Two parallel runs would both
# read prev=rN from the mutable tag and both write rN+1, producing a duplicate
# immutable ref.
concurrency:
  group: build-${{ inputs.suitecrm_version || github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      suitecrm_version: ${{ steps.vars.outputs.suitecrm_version }}
      php_version: ${{ steps.vars.outputs.php_version }}
      revision: ${{ steps.revision.outputs.revision }}
      base_digest: ${{ steps.base.outputs.base_digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve build args
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SC_VER="${{ inputs.suitecrm_version }}"
            PHP_VER="${{ inputs.php_version }}"
          else
            # Tag form: v<suitecrm-version> (e.g. v7.15.1)
            SC_VER="${GITHUB_REF_NAME#v}"
            PHP_VER="8.4"
          fi
          echo "suitecrm_version=$SC_VER" >>"$GITHUB_OUTPUT"
          echo "php_version=$PHP_VER"      >>"$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >>"$GITHUB_OUTPUT"

      - uses: imjasonh/setup-crane@v0.4

      - name: Resolve base image digest
        id: base
        env:
          PHP_VER: ${{ steps.vars.outputs.php_version }}
          INPUT_BASE_DIGEST: ${{ inputs.base_digest }}
        run: |
          set -euo pipefail
          BASE_REF="serversideup/php:${PHP_VER}-fpm-nginx-alpine"
          if [ -n "${INPUT_BASE_DIGEST}" ]; then
            digest="${INPUT_BASE_DIGEST}"
          else
            digest=$(crane digest "${BASE_REF}")
          fi
          echo "base_ref=${BASE_REF}@${digest}" >>"$GITHUB_OUTPUT"
          echo "base_digest=${digest}"          >>"$GITHUB_OUTPUT"
          echo "resolved ${BASE_REF}@${digest}"

      - name: Log in to GHCR (read prior tag)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next revision
        id: revision
        env:
          SC_VER: ${{ steps.vars.outputs.suitecrm_version }}
          INPUT_REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_REVISION}" ]; then
            revision="${INPUT_REVISION}"
          else
            REF="${REGISTRY}/${IMAGE_NAME}:${SC_VER}"
            revision="r1"
            if cfg=$(crane config "${REF}" 2>/dev/null); then
              prev=$(echo "${cfg}" | jq -r '.config.Labels["org.opencontainers.image.version"] // empty')
              prev_rev="${prev##*-}"
              case "${prev_rev}" in
                r[0-9]*) revision="r$(( ${prev_rev#r} + 1 ))" ;;
              esac
            fi
          fi
          echo "revision=${revision}" >>"$GITHUB_OUTPUT"
          echo "next revision: ${revision}"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build image (local load)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          build-args: |
            SUITECRM_VERSION=${{ steps.vars.outputs.suitecrm_version }}
            PHP_VERSION=${{ steps.vars.outputs.php_version }}
            BASE_IMAGE=${{ steps.base.outputs.base_ref }}
            BASE_IMAGE_DIGEST=${{ steps.base.outputs.base_digest }}
            IMAGE_REVISION=${{ steps.revision.outputs.revision }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
          tags: suitecrm:test
          provenance: false

      - name: Save image tarball
        run: docker save suitecrm:test -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: image
          path: /tmp/image.tar
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -r tests/requirements.txt

      - name: Image + runtime tests
        env:
          IMAGE: suitecrm:test
        run: pytest -v tests/ --junitxml=report.xml

      - name: Dump suitecrm container logs on failure
        if: failure()
        run: |
          for c in $(docker ps -a --filter "name=^sc-" --format '{{.Names}}'); do
            echo "--- $c ---"
            docker logs "$c" 2>&1 || true
          done

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report
          path: report.xml
          retention-days: 7

  compose-test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Bring up compose stack
        env:
          SUITECRM_IMAGE: suitecrm:test
        run: docker compose up -d

      - name: Wait for login page to return 200
        run: |
          # Silent install on cold MySQL boot can take 60-180s; 300s budget.
          for i in $(seq 1 150); do
            code=$(curl -sf -o /dev/null -w '%{http_code}' \
              'http://localhost:8080/index.php?module=Users&action=Login' || echo "000")
            if [ "$code" = "200" ]; then
              echo "ready after ${i} polls"
              exit 0
            fi
            sleep 2
          done
          echo "timed out waiting for login page"
          exit 1

      - name: Assert healthcheck propagated
        run: |
          for i in $(seq 1 18); do
            status=$(docker inspect --format '{{.State.Health.Status}}' suitecrm-suitecrm-1)
            echo "health status: $status"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "container reported unhealthy"
              exit 1
            fi
            sleep 5
          done
          echo "timed out waiting for healthy status"
          exit 1

      - name: Assert clean first boot
        run: |
          restarts=$(docker inspect --format '{{.RestartCount}}' suitecrm-suitecrm-1)
          echo "restart count: $restarts"
          [ "$restarts" = "0" ] || exit 1
          if docker compose logs suitecrm 2>&1 | grep -E 'not reachable|FATAL|Restarting'; then
            echo "found error markers in suitecrm logs"
            exit 1
          fi

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  publish:
    needs: [build, test, compose-test]
    if: github.event_name != 'workflow_dispatch' || inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Push three refs to each registry:
      #   <version>-r<N>   immutable, addresses this exact build
      #   <version>        mutable, floats to newest revision of <version>
      #   latest           mutable, floats to newest revision overall
      - name: Tag and push
        env:
          SC_VER: ${{ needs.build.outputs.suitecrm_version }}
          REVISION: ${{ needs.build.outputs.revision }}
          DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/docker-suitecrm
        run: |
          set -euo pipefail
          for REPO in "${REGISTRY}/${IMAGE_NAME}" "docker.io/${DOCKERHUB_REPO}"; do
            docker tag suitecrm:test "${REPO}:${SC_VER}-${REVISION}"
            docker tag suitecrm:test "${REPO}:${SC_VER}"
            docker tag suitecrm:test "${REPO}:latest"
            docker push "${REPO}:${SC_VER}-${REVISION}"
            docker push "${REPO}:${SC_VER}"
            docker push "${REPO}:latest"
          done
