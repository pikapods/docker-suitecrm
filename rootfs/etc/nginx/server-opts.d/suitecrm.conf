# SuiteCRM-specific nginx overrides.
# SuiteCRM 7 serves from the project root, NOT /public (unlike Laravel apps).
# Dockerfile sets NGINX_WEBROOT=/var/www/html so the base template renders
# the server root correctly.

# SuiteCRM imports/attachments routinely exceed nginx's 1 MB default. 50 MB
# matches the upstream installer recommendation.
client_max_body_size 50m;

# Deny direct access to installer entry points and config files.
# SuiteCRM's .htaccess does this on Apache; nginx ignores .htaccess so we
# replicate the rules here. Without these, an attacker who can write a .php
# under any mutable tree gets RCE via the base image's php-fpm location.
location = /install.php          { deny all; return 403; }
location ^~ /install/            { deny all; return 403; }
location = /config.php           { deny all; return 403; }
location = /config_override.php  { deny all; return 403; }
location = /config_si.php        { deny all; return 403; }

# Block exposure of secrets and bulk data.
location ^~ /custom/blowfish/    { deny all; return 403; }
location ^~ /upload/import/      { deny all; return 403; }
location ^~ /upload/tmp/         { deny all; return 403; }

# Block PHP/phar/phtml/tpl execution under any tree that accepts uploads or
# is otherwise operator-writable. Without this, an uploaded `.php` under
# /upload/ is executed by the base image's `location ~ \.php$` block.
location ~* ^/(upload|cache|custom|modules|data)/.*\.(php|phtml|phar|tpl|pl|cgi)$ {
    deny all;
    return 403;
}

# Block log/dump artefacts under mutable trees.
location ~* ^/(cache|custom|modules|upload|data)/.*\.(log|sql|gz|zip|tar)$ {
    deny all;
    return 403;
}
